%YAML:1.0

cam0:
  # T_imu_cam: rotation from camera to IMU (R_CtoI), position of camera in IMU (p_CinI)
  # Derived from static TF in red_bringup: base_link -> camera_link/StereoLeft.
  T_imu_cam:
    - [0.0,  0.0, 1.0,  0.13233]
    - [-1.0, 0.0, 0.0,  0.105  ]
    - [0.0, -1.0, 0.0,  0.50278]
    - [0.0,  0.0, 0.0,  1.0    ]
  cam_overlaps: [1]
  camera_model: pinhole
  distortion_coeffs: [0.0, 0.0, 0.0, 0.0]
  distortion_model: radtan
  # StereoLeft in OakD-Lite model.sdf: width=640, height=480, horizontal_fov=1.274 rad
  intrinsics: [432.50, 432.50, 320.0, 240.0] # fu, fv, cu, cv
  resolution: [640, 480]
  rostopic: /cam0/image_raw

cam1:
  # T_imu_cam: rotation from camera to IMU (R_CtoI), position of camera in IMU (p_CinI)
  # Derived from static TF in red_bringup: base_link -> camera_link/StereoRight.
  T_imu_cam:
    - [0.0,  0.0, 1.0,  0.13233]
    - [-1.0, 0.0, 0.0, -0.045  ]
    - [0.0, -1.0, 0.0,  0.50278]
    - [0.0,  0.0, 0.0,  1.0    ]
  cam_overlaps: [0]
  camera_model: pinhole
  distortion_coeffs: [0.0, 0.0, 0.0, 0.0]
  distortion_model: radtan
  # StereoRight in OakD-Lite model.sdf: width=640, height=480, horizontal_fov=1.274 rad
  intrinsics: [432.50, 432.50, 320.0, 240.0] # fu, fv, cu, cv
  resolution: [640, 480]
  rostopic: /cam1/image_raw
